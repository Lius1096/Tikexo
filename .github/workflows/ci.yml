name: TIKEXO CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances backend
        working-directory: backend
        run: npm ci

      - name: Lint ESLint
        working-directory: backend
        run: npm run lint

      - name: Lint TypeScript (web)
        working-directory: web
        run: |
          npm ci
          npm run type-check

  # ── 2. Tests unitaires ────────────────────────────────────────────────────
  test-unitaire:
    name: Tests unitaires
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances
        working-directory: backend
        run: npm ci

      - name: Exécuter tests unitaires avec couverture
        working-directory: backend
        run: npm run test:unit -- --coverage
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test-jwt-secret-tikexo-ci' }}

      - name: Upload coverage → Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: unit
          fail_ci_if_error: false

  # ── 3. Tests d'intégration ────────────────────────────────────────────────
  test-integration:
    name: Tests d'intégration
    runs-on: ubuntu-latest
    needs: test-unitaire

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tikexo_test
          POSTGRES_USER: tikexo
          POSTGRES_PASSWORD: tikexo_test_pwd
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances
        working-directory: backend
        run: npm ci

      - name: Prisma migrate (test DB)
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://tikexo:tikexo_test_pwd@localhost:5432/tikexo_test

      - name: Exécuter tests d'intégration
        working-directory: backend
        run: npm run test:integration
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://tikexo:tikexo_test_pwd@localhost:5432/tikexo_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test-jwt-secret-tikexo-ci' }}
          FEDAPAY_WEBHOOK_SECRET: ''
          CLOUDINARY_URL: ''
          FIREBASE_PROJECT_ID: ''

  # ── 4. Tests de sécurité ─────────────────────────────────────────────────
  test-securite:
    name: Tests de sécurité
    runs-on: ubuntu-latest
    needs: test-integration

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tikexo_security_test
          POSTGRES_USER: tikexo
          POSTGRES_PASSWORD: tikexo_test_pwd
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances
        working-directory: backend
        run: npm ci

      - name: Prisma migrate (security test DB)
        working-directory: backend
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://tikexo:tikexo_test_pwd@localhost:5432/tikexo_security_test

      - name: Exécuter tests de sécurité
        working-directory: backend
        run: npm run test:security
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://tikexo:tikexo_test_pwd@localhost:5432/tikexo_security_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'test-jwt-secret-tikexo-ci' }}

  # ── 5. Tests E2E (Playwright) ─────────────────────────────────────────────
  test-e2e:
    name: Tests E2E Playwright
    runs-on: ubuntu-latest
    needs: test-securite
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Démarrer l'environnement de dev (docker compose)
        run: docker compose -f docker-compose.dev.yml up -d --wait
        timeout-minutes: 5

      - name: Installer Playwright
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Exécuter tests E2E
        working-directory: web
        run: npx playwright test e2e/
        env:
          BASE_URL: http://localhost:5173
          TEST_SUPER_ADMIN_PHONE: ${{ secrets.TEST_SUPER_ADMIN_PHONE }}
          TEST_RH_PHONE: ${{ secrets.TEST_RH_PHONE }}
          TEST_BENEF_PHONE: ${{ secrets.TEST_BENEF_PHONE }}

      - name: Upload rapport Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: Arrêter docker compose
        if: always()
        run: docker compose -f docker-compose.dev.yml down

  # ── 6. Audit des dépendances ──────────────────────────────────────────────
  audit-dependances:
    name: Audit de sécurité npm
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit backend
        working-directory: backend
        run: |
          npm ci
          # Bloquer si vulnérabilité CRITIQUE détectée
          npm audit --audit-level=critical
          echo "Audit backend : OK"

      - name: Audit web
        working-directory: web
        run: |
          npm ci
          npm audit --audit-level=critical
          echo "Audit web : OK"

  # ── 7. Build Docker ───────────────────────────────────────────────────────
  build-docker:
    name: Build image Docker
    runs-on: ubuntu-latest
    needs: [test-integration, audit-dependances]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Connexion au registry GitHub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build et push image backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 8. Déploiement production ─────────────────────────────────────────────
  deploy-production:
    name: Déploiement production (tikexo.bj)
    runs-on: ubuntu-latest
    needs: [build-docker, test-e2e]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://tikexo.bj

    steps:
      - uses: actions/checkout@v4

      - name: Déployer sur tikexo.bj via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT || 22 }}
          script: |
            set -e
            cd /opt/tikexo

            echo "=== TIKEXO — Déploiement production ==="
            echo "SHA: ${{ github.sha }}"

            # Pull les nouvelles images
            docker compose pull

            # Sauvegarder l'état actuel pour rollback
            CURRENT_SHA=$(docker compose images -q backend 2>/dev/null | head -1 || echo "none")

            # Migrer la base de données AVANT le redémarrage
            docker compose run --rm backend npx prisma migrate deploy

            # Redémarrer avec zero-downtime
            docker compose up -d --remove-orphans

            # Attendre que le service soit sain (max 60s)
            echo "Vérification santé..."
            for i in $(seq 1 12); do
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://tikexo.bj/health || echo "000")
              if [ "$HTTP_STATUS" = "200" ]; then
                echo "Service sain après $((i * 5))s"
                break
              fi
              if [ $i -eq 12 ]; then
                echo "ÉCHEC : service non sain après 60s — ROLLBACK"
                docker compose down
                docker compose up -d
                exit 1
              fi
              sleep 5
            done

            # Nettoyer les images orphelines
            docker image prune -f

            echo "=== Déploiement TIKEXO réussi ==="
