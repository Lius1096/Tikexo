version: '3.8'

# Développement local — sans Traefik, avec hot-reload
services:
  postgres:
    image: postgres:16-alpine
    container_name: tikexo_postgres_dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tikexo_dev
      POSTGRES_USER: tikexo
      POSTGRES_PASSWORD: tikexo_dev_password
    volumes:
      - tikexo_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tikexo -d tikexo_dev"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tikexo-network-dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: tikexo_backend_dev
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://tikexo:tikexo_dev_password@postgres:5432/tikexo_dev
      NODE_ENV: development
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "npx prisma db push --accept-data-loss && npm run dev"]
    networks:
      - tikexo-network-dev

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: development
    container_name: tikexo_web_dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:3001
    volumes:
      - ./web/src:/app/src
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    networks:
      - tikexo-network-dev

volumes:
  tikexo_pgdata_dev:
    driver: local

networks:
  tikexo-network-dev:
    driver: bridge
