version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tikexo_postgres
    environment:
      POSTGRES_DB: tikexo_prod
      POSTGRES_USER: ${POSTGRES_USER:-tikexo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD requis}
    volumes:
      - tikexo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tikexo} -d tikexo_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tikexo-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tikexo_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tikexo}:${POSTGRES_PASSWORD}@postgres:5432/tikexo_prod
      NODE_ENV: production
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tikexo-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tikexo-api.rule=Host(`tikexo.bj`) && PathPrefix(`/api`)"
      - "traefik.http.routers.tikexo-api.entrypoints=websecure"
      - "traefik.http.routers.tikexo-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.tikexo-api.loadbalancer.server.port=3001"
      - "traefik.http.routers.tikexo-api.middlewares=tikexo-security@file,tikexo-compress@file"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: tikexo_web
    networks:
      - tikexo-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tikexo-web.rule=Host(`tikexo.bj`) && (PathPrefix(`/admin`) || PathPrefix(`/employeur`) || PathPrefix(`/`))"
      - "traefik.http.routers.tikexo-web.entrypoints=websecure"
      - "traefik.http.routers.tikexo-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.tikexo-web.loadbalancer.server.port=5173"
      - "traefik.http.routers.tikexo-web.middlewares=tikexo-security@file,tikexo-compress@file"

  traefik:
    image: traefik:v3.0
    container_name: tikexo_traefik
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik
      - tikexo_traefik_certs:/etc/traefik/acme
    networks:
      - tikexo-network
    restart: unless-stopped

volumes:
  tikexo_pgdata:
    driver: local
  tikexo_traefik_certs:
    driver: local

networks:
  tikexo-network:
    driver: bridge
